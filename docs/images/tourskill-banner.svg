<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#38bdf8" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="500" y1="0" x2="500" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="700" y1="0" x2="700" y2="200" />
  </g>

  <!-- Glow line -->
  <rect x="100" y="155" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.6" />

  <!-- Left icon: Agent node -->
  <g transform="translate(180, 75)">
    <!-- User agent circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.8" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.4" />
    <!-- Person icon -->
    <circle cx="0" cy="-6" r="7" fill="#38bdf8" opacity="0.9" />
    <path d="M-11 12 Q-11 2 0 2 Q11 2 11 12" fill="#38bdf8" opacity="0.9" />
  </g>

  <!-- Connection line with dots -->
  <g opacity="0.6">
    <line x1="220" y1="75" x2="340" y2="75" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="6 4" />
    <circle cx="260" cy="75" r="3" fill="#38bdf8" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="75" r="3" fill="#818cf8" opacity="0.8">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Center: TourSkill text -->
  <text x="400" y="65" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">
    Tour<tspan fill="url(#accent)">Skill</tspan>
  </text>
  <text x="400" y="90" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="3">
    AGENT-TO-AGENT TOURISM
  </text>

  <!-- Tagline -->
  <text x="400" y="140" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="1">
    Decentralized Merchant Registry  |  MCP Protocol  |  Peer-to-Peer Commerce
  </text>

  <!-- Connection line with dots (right) -->
  <g opacity="0.6">
    <line x1="460" y1="75" x2="580" y2="75" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="6 4" />
    <circle cx="500" cy="75" r="3" fill="#818cf8" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="540" cy="75" r="3" fill="#38bdf8" opacity="0.8">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Right icon: Merchant node -->
  <g transform="translate(620, 75)">
    <!-- Merchant agent circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.8" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4" />
    <!-- Store icon -->
    <rect x="-10" y="-4" width="20" height="14" rx="2" fill="#818cf8" opacity="0.9" />
    <path d="M-12 -4 L0 -14 L12 -4" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.9" />
    <rect x="-3" y="2" width="6" height="8" rx="1" fill="#1e293b" opacity="0.9" />
  </g>

  <!-- Corner decorations -->
  <circle cx="50" cy="30" r="2" fill="#38bdf8" opacity="0.3" />
  <circle cx="750" cy="30" r="2" fill="#818cf8" opacity="0.3" />
  <circle cx="50" cy="170" r="2" fill="#818cf8" opacity="0.3" />
  <circle cx="750" cy="170" r="2" fill="#38bdf8" opacity="0.3" />
</svg>
