name: Publish @concourse-protocol/discover

# Auto-publish to npm when a tag matching `discover-cli-v*` is pushed.
# Example: `git tag discover-cli-v0.1.0 && git push --tags`
#
# Setup (one-time):
#   1. Create npm automation token: https://www.npmjs.com/settings/<user>/tokens
#      → "Automation" type (bypasses 2FA for CI). Keep "publish" scope.
#   2. Add it as the GitHub repo secret named `NPM_TOKEN`.
#      Settings → Secrets and variables → Actions → New repository secret.
#   3. The first publish must still happen locally (to claim @concourse-protocol org).
#      After that, every tag push goes through this workflow.

on:
  push:
    tags:
      - 'discover-cli-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases
      id-token: write   # for npm provenance
    defaults:
      run:
        working-directory: packages/discover-cli
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: packages/discover-cli/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/discover-cli-v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/discover-cli-v}"
          PKG_VERSION=$(jq -r .version package.json)
          echo "tag=$TAG_VERSION  package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag version $TAG_VERSION != package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish (dry-run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --access public --dry-run --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack tarball for GitHub Release attachment
        if: startsWith(github.ref, 'refs/tags/discover-cli-v') && github.event.inputs.dry_run != 'true'
        run: npm pack

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/discover-cli-v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: packages/discover-cli/concourse-discover-*.tgz
          body: |
            **@concourse-protocol/discover** — discover, verify, and invoke ERC-8004 / A2A agents directly from chain.

            Install:
            ```bash
            npx -y @concourse-protocol/discover@${{ github.ref_name }} list
            # or
            npm i -g @concourse-protocol/discover@${{ github.ref_name }}
            ```

            MCP server (Claude Desktop / Cursor):
            ```json
            {"mcpServers":{"concourse":{"command":"npx","args":["-y","@concourse-protocol/discover","concourse-mcp"]}}}
            ```

            Auto-generated release notes follow.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
